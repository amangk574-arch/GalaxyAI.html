<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy AI Interface</title>
    <style>
        /* Classic & Clean Look */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        #chat-container { 
            width: 450px; 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; color: #333; margin-top: 0; }
        #chat-box { 
            height: 350px; 
            border: 1px solid #ddd; 
            padding: 15px; 
            overflow-y: scroll; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            background-color: #fafafa;
        }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>Galaxy AI</h2>
    <div id="chat-box">
        <p>Galaxy AI is online. How can I assist you today?</p>
    </div>
    <div class="input-group">
        <input type="text" id="user-input" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // यहाँ आप और भी सवाल और जवाब जोड़ सकते हैं
    const responses = {
        "what is data entry": "Data entry is the process of inputting information into a computer system, such as typing text into a database or spreadsheet.",
        "hello": "Hello! I am Galaxy AI. How can I help you today?",
        "hi": "Hi there! I am ready to assist you.",
        "who are you": "I am Galaxy AI, your intelligent assistant."
    };

    function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const message = inputField.value.toLowerCase().trim();

        if (message === "") return;

        chatBox.innerHTML += `<p><b>You:</b> ${inputField.value}</p>`;
        
        let reply = responses[message] || "I am currently in front-end mode, but I can still help you with basic queries!";
        
        setTimeout(() => {
            chatBox.innerHTML += `<p><b>Galaxy AI:</b> ${reply}</p>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 500);

        inputField.value = "";
    }
</script>

</body>
</html>
